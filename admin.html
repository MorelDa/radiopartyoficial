<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Panel Administrador - Radio Party Valencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>:root{
  --primary:#ff3ea5;
  --primary-dark:#d6006c;
  --primary-light:#3a1530;
  --accent:#9b4dff;
  --bg:#0a0612;
  --surface:#14091f;
  --surface-2:#1d0e2e;
  --text:#f4ecf6;
  --text-muted:#a99fb4;
  --border:#2a1640;
  --success:#10b981;
  --danger:#ef4444;
  --shadow:0 8px 24px rgba(0,0,0,0.5);
  --shadow-sm:0 2px 10px rgba(255,62,165,0.18);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at 20% 0%,#2a0a3e,#0a0612 60%);color:var(--text);font-size:14px;line-height:1.5;display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:#14091f}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ff3ea5,#9b4dff);border-radius:10px}

/* SIDEBAR */
.sidebar{width:280px;background:linear-gradient(180deg,#14091f,#0a0612);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:transform .3s}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:22px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-radius:12px;display:grid;place-items:center;font-size:18px;box-shadow:0 8px 22px rgba(255,62,165,.35)}
.sb-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.3px}
.sb-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.sb-link{display:flex;align-items:center;gap:12px;padding:11px 14px;background:transparent;border:none;border-radius:10px;text-align:left;font-size:13.5px;font-weight:500;color:var(--text-muted);transition:all .2s;width:100%}
.sb-link i{width:18px;color:var(--text-muted);font-size:14px}
.sb-link:hover{background:rgba(255,62,165,.08);color:#fff}
.sb-link:hover i{color:var(--primary)}
.sb-link.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:600;box-shadow:0 8px 20px rgba(255,62,165,.35)}
.sb-link.active i{color:#fff}
.sidebar-bottom{padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* BUTTONS */
.btn-primary,.btn-secondary,.btn-ghost,.btn-danger{padding:10px 16px;border-radius:10px;border:none;font-weight:600;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 6px 18px rgba(255,62,165,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,62,165,.55)}
.btn-secondary{background:rgba(255,62,165,.12);color:var(--primary);border:1px solid rgba(255,62,165,.2)}
.btn-secondary:hover{background:rgba(255,62,165,.2)}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-danger{background:rgba(239,68,68,.15);color:#ff7676;border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:rgba(20,9,31,.7);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10}
.topbar h1{font-family:'Montserrat',sans-serif;font-size:20px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;letter-spacing:-.3px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.autosave-pill{font-size:11px;color:var(--success);background:rgba(16,185,129,.12);padding:5px 10px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(16,185,129,.25)}
.autosave-pill i{font-size:8px}
.mobile-menu-btn{display:none;background:transparent;border:none;font-size:22px;color:var(--primary)}

.content{padding:28px;max-width:100%}

/* CARDS / FORMS */
.card{background:linear-gradient(165deg,var(--surface),var(--surface-2));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px}
.card-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.5px}
.card-title i{color:var(--primary)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.form-input,.form-textarea,.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:rgba(0,0,0,.3);font-family:inherit;font-size:13.5px;color:var(--text);transition:all .2s}
.form-textarea{resize:vertical;min-height:80px;font-family:inherit}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--primary);background:rgba(0,0,0,.5);box-shadow:0 0 0 4px rgba(255,62,165,.12)}
.form-input::placeholder,.form-textarea::placeholder{color:#5a4a6e}
.form-input[type="color"]{padding:4px;height:42px;cursor:pointer}

.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type="color"]{width:50px;height:38px;border:1.5px solid var(--border);border-radius:8px;padding:2px;cursor:pointer;flex-shrink:0;background:transparent}
.color-row input[type="text"]{flex:1}

/* LIST ITEMS */
.items-list{display:flex;flex-direction:column;gap:12px}
.item-card{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s}
.item-card:hover{border-color:var(--primary);box-shadow:0 8px 20px rgba(255,62,165,.15)}
.item-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.item-title{font-weight:700;font-size:14px;color:#fff;display:flex;align-items:center;gap:8px}
.item-title .item-num{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800}
.item-actions{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-muted);transition:all .2s}
.icon-btn:hover{background:rgba(255,62,165,.15);color:var(--primary);border-color:var(--primary)}
.icon-btn.delete:hover{background:rgba(239,68,68,.15);color:#ff7676;border-color:rgba(239,68,68,.4)}

.add-btn{padding:13px 16px;border:1.5px dashed var(--primary);background:rgba(255,62,165,.05);color:var(--primary);border-radius:var(--radius);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:all .2s}
.add-btn:hover{background:rgba(255,62,165,.12)}

/* IMG PREVIEW */
.img-preview{width:64px;height:64px;border-radius:10px;object-fit:cover;background:rgba(0,0,0,.3);border:1px solid var(--border);flex-shrink:0}
.preview-row{display:flex;align-items:center;gap:12px}

/* SCHEDULE TABS */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;background:rgba(0,0,0,.3);padding:6px;border-radius:12px;border:1px solid var(--border)}
.day-tab-admin{padding:9px 14px;border:none;background:transparent;border-radius:8px;font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.day-tab-admin:hover{color:#fff}
.day-tab-admin.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 4px 12px rgba(255,62,165,.35)}

/* JSON VIEW */
.json-view{background:#000;color:#ffafe0;padding:22px;border-radius:var(--radius);font-family:'Courier New',monospace;font-size:12.5px;overflow-x:auto;white-space:pre-wrap;max-height:70vh;line-height:1.65;border:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--surface),var(--surface-2));color:#fff;padding:14px 22px;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.6);font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .25s;z-index:100;pointer-events:none;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(16,185,129,.4);box-shadow:0 16px 40px rgba(16,185,129,.25)}
.toast.success i{color:var(--success)}
.toast.error{border-color:rgba(239,68,68,.4)}
.toast.error i{color:#ff7676}

/* INFO BOX */
.info-box{background:linear-gradient(135deg,rgba(255,62,165,.08),rgba(155,77,255,.05));border-left:4px solid var(--primary);padding:14px 18px;border-radius:10px;font-size:13px;color:var(--text);margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.info-box i{color:var(--primary);margin-top:2px;font-size:16px}

/* RESPONSIVE */
@media (max-width:980px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:50;box-shadow:8px 0 30px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:block}
  .content{padding:18px}
  .topbar{padding:14px 18px}
  .topbar h1{font-size:16px}
  .btn-ghost{display:none}
}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fas fa-broadcast-tower"></i></div>
      <div>
        <div class="sb-title">Radio Party Valencia</div>
        <div class="sb-sub">Panel Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="sb-link active" data-tab="site"><i class="fas fa-globe"></i> Información del Sitio</button>
      <button class="sb-link" data-tab="theme"><i class="fas fa-palette"></i> Colores y Tema</button>
      <button class="sb-link" data-tab="menu"><i class="fas fa-bars"></i> Menú</button>
      <button class="sb-link" data-tab="player"><i class="fas fa-play-circle"></i> Reproductor / EN VIVO</button>
      <button class="sb-link" data-tab="banners"><i class="fas fa-images"></i> Banners</button>
      <button class="sb-link" data-tab="news"><i class="fas fa-newspaper"></i> Últimas Noticias</button>
      <button class="sb-link" data-tab="featuredNews"><i class="fas fa-star"></i> Noticias Destacadas</button>
      <button class="sb-link" data-tab="topPrograms"><i class="fas fa-trophy"></i> Programas Top</button>
      <button class="sb-link" data-tab="schedule"><i class="fas fa-calendar-week"></i> Programación</button>
      <button class="sb-link" data-tab="podcasts"><i class="fas fa-podcast"></i> Podcasts</button>
      <button class="sb-link" data-tab="videos"><i class="fab fa-youtube"></i> Top Videos</button>
      <button class="sb-link" data-tab="partyClips"><i class="fas fa-film"></i> Party Clips (Vertical)</button>
      <button class="sb-link" data-tab="locutores"><i class="fas fa-microphone"></i> Locutores</button>
      <button class="sb-link" data-tab="vote"><i class="fas fa-heart"></i> Party Mixx Vote</button>
      <button class="sb-link" data-tab="footer"><i class="fas fa-shoe-prints"></i> Pie de Página</button>
      <button class="sb-link" data-tab="json"><i class="fas fa-code"></i> Vista JSON</button>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-secondary" id="loadJsonBtn"><i class="fas fa-upload"></i> Importar JSON antiguo</button>
      <input type="file" id="loadJsonInput" accept="application/json" hidden />
      <button class="btn-primary" id="downloadBtn"><i class="fas fa-download"></i> Descargar JSON</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
      <h1 id="pageTitle">Información del Sitio</h1>
      <div class="topbar-actions">
        <span class="autosave-pill" id="autosavePill"><i class="fas fa-circle"></i> Auto-guardado activo</span>
        <a href="index.html" target="_blank" class="btn-ghost"><i class="fas fa-eye"></i> Previsualizar Sitio</a>
        <button class="btn-primary" id="saveBtn"><i class="fas fa-save"></i> Guardar Cambios</button>
      </div>
    </header>

    <div class="content" id="content"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>// ============================================
// ADMIN.JS - Panel Administrador Visual
// ============================================
let DATA = null;
let currentTab = 'site';
let currentDay = 'lunes';

const DAY_KEYS = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
const DAY_LABELS = {lunes:'Lunes',martes:'Martes',miercoles:'Miércoles',jueves:'Jueves',viernes:'Viernes',sabado:'Sábado',domingo:'Domingo'};

const TAB_TITLES = {
  site:'Información del Sitio',theme:'Colores y Tema',menu:'Menú de Navegación',
  player:'Reproductor / EN VIVO',banners:'Banners Promocionales',news:'Últimas Noticias',
  featuredNews:'Noticias Destacadas',topPrograms:'Programas Más Sintonizados',
  schedule:'Programación Radial',podcasts:'Podcasts',videos:'Top Video Ranking',
  locutores:'Nuestros Locutores',vote:'Party Mixx Vote (Votación)',partyClips:'Party Clips · Videos Verticales',footer:'Pie de Página',json:'Vista JSON'
};

// LOAD INITIAL DATA
async function init(){
  try{
    const res = await fetch('data.json?v='+Date.now());
    DATA = await res.json();
  }catch(e){
    DATA = getDefaultData();
    toast('No se pudo cargar data.json. Usando estructura por defecto.', 'error');
  }
  // Try load from localStorage if newer changes exist (auto-restore)
  const saved = localStorage.getItem('admin_data_draft');
  if(saved){
    try{
      const draft = JSON.parse(saved);
      DATA = mergeData(DATA, draft);
      toast('Configuración restaurada automáticamente desde tu última sesión','success');
    }catch(e){}
  }
  DATA = ensureSchema(DATA);
  bindNav();
  bindActions();
  render();
  setupAutosave();
}

// Backward-compatible schema enforcement (acepta JSON antiguo)
function ensureSchema(d){
  d = d || {};
  d.theme = d.theme || {primary:'#d6006c',primaryDark:'#7a0a52',primaryLight:'#fde7f1',accent:'#9b4dff',background:'#ffffff',surface:'#fbf5fb',text:'#1a0a2e',textMuted:'#6b5b73'};
  d.site = d.site || {};
  d.site.social = d.site.social || {facebook:'',instagram:'',youtube:'',tiktok:'',whatsapp:''};
  d.menu = d.menu || [];
  d.player = d.player || {showTitle:'EN DIRECTO',programName:'',hostName:'',schedule:'',cover:''};
  d.banners = d.banners || [];
  d.news = d.news || [];
  d.featuredNews = d.featuredNews || [];
  d.topPrograms = d.topPrograms || [];
  d.schedule = d.schedule || {lunes:[],martes:[],miercoles:[],jueves:[],viernes:[],sabado:[],domingo:[]};
  d.podcasts = d.podcasts || [];
  d.videos = d.videos || [];
  d.locutores = d.locutores || [];
  // Back-compat: tabomixVote -> partyMixxVote
  if(!d.partyMixxVote && d.tabomixVote){ d.partyMixxVote = d.tabomixVote; }
  d.partyMixxVote = d.partyMixxVote || [];
  d.tabomixVote = d.partyMixxVote; // keep mirror for back-compat
  d.partyClips = d.partyClips || [];
  d.footer = d.footer || {about:'',contact:{phone:'',email:'',address:''},copyright:''};
  d.footer.contact = d.footer.contact || {phone:'',email:'',address:''};
  return d;
}

function mergeData(base, override){
  const result = ensureSchema(JSON.parse(JSON.stringify(base)));
  Object.keys(override||{}).forEach(k=>{ result[k] = override[k]; });
  return ensureSchema(result);
}

// AUTO-SAVE: cada cambio se guarda automáticamente en localStorage
let _autosaveTimer = null;
function autosave(){
  clearTimeout(_autosaveTimer);
  _autosaveTimer = setTimeout(()=>{
    try{
      localStorage.setItem('admin_data_draft', JSON.stringify(DATA));
      const pill = document.getElementById('autosavePill');
      if(pill){
        pill.innerHTML = '<i class="fas fa-circle"></i> Guardado automático ✓';
        pill.style.opacity = '1';
        clearTimeout(pill._t);
        pill._t = setTimeout(()=>{pill.style.opacity='.7';}, 1500);
      }
    }catch(e){}
  }, 350);
}
function setupAutosave(){
  // Listen any input change globally
  document.addEventListener('input', autosave);
  document.addEventListener('change', autosave);
}

function bindNav(){
  document.querySelectorAll('.sb-link').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.sb-link').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      currentTab = b.dataset.tab;
      document.getElementById('pageTitle').textContent = TAB_TITLES[currentTab];
      document.querySelector('.sidebar').classList.remove('open');
      render();
    });
  });
  document.getElementById('mobileMenuBtn').onclick = ()=>document.querySelector('.sidebar').classList.toggle('open');
}

function bindActions(){
  document.getElementById('saveBtn').onclick = ()=>{
    localStorage.setItem('admin_data_draft', JSON.stringify(DATA));
    toast('✅ Configuración guardada. Recuerda descargar el data.json para subirlo a tu hosting.', 'success');
  };
  document.getElementById('downloadBtn').onclick = downloadJSON;
  document.getElementById('loadJsonBtn').onclick = ()=>document.getElementById('loadJsonInput').click();
  document.getElementById('loadJsonInput').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const imported = JSON.parse(ev.target.result);
        DATA = ensureSchema(imported);
        autosave();
        toast('✅ JSON importado y aplicado correctamente (compatible con versiones anteriores)','success');
        render();
      }catch(err){toast('❌ Archivo JSON inválido','error');}
    };
    reader.readAsText(file);
  };
}

function downloadJSON(){
  const blob = new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download='data.json';a.click();
  URL.revokeObjectURL(url);
  toast('¡data.json descargado! Súbelo a GitHub junto al index.html','success');
}

function toast(msg,type=''){
  const t = document.getElementById('toast');
  t.className = 'toast show ' + type;
  t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i>${msg}`;
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>{t.className='toast';},3500);
}

// ============================================
// RENDER FORMS
// ============================================
function render(){
  const c = document.getElementById('content');
  c.innerHTML = '';
  const r = RENDERERS[currentTab];
  if(r) r(c);
}

const RENDERERS = {
  site:renderSite,theme:renderTheme,menu:renderMenu,player:renderPlayer,
  banners:renderBanners,news:renderNews,featuredNews:renderFeaturedNews,
  topPrograms:renderTopPrograms,schedule:renderSchedule,podcasts:renderPodcasts,
  videos:renderVideos,locutores:renderLocutores,vote:renderVote,partyClips:renderPartyClips,footer:renderFooter,json:renderJSON
};

// Helper: text field
function field(label,value,onchange,type='text',placeholder=''){
  const id = 'f_'+Math.random().toString(36).slice(2,9);
  return `<div class="form-group"><label class="form-label" for="${id}">${label}</label><input id="${id}" type="${type}" class="form-input" value="${(value||'').toString().replace(/"/g,'&quot;')}" placeholder="${placeholder}" data-on="${onchange}" /></div>`;
}
function fieldFull(label,value,onchange,type='text'){
  return `<div class="form-group full"><label class="form-label">${label}</label><input type="${type}" class="form-input" value="${(value||'').toString().replace(/"/g,'&quot;')}" data-on="${onchange}" /></div>`;
}
function textareaFull(label,value,onchange){
  return `<div class="form-group full"><label class="form-label">${label}</label><textarea class="form-textarea" data-on="${onchange}">${value||''}</textarea></div>`;
}
function colorField(label,value,onchange){
  return `<div class="form-group"><label class="form-label">${label}</label><div class="color-row"><input type="color" value="${value||'#d6006c'}" data-on="${onchange}_color" /><input type="text" class="form-input" value="${value||''}" data-on="${onchange}" /></div></div>`;
}

// Bind inputs via delegation
document.addEventListener('input',e=>{
  const t = e.target;
  if(!t.dataset.on) return;
  const fn = HANDLERS[t.dataset.on];
  if(fn) fn(t.value, t);
});

const HANDLERS = {};

// ============== SITE ==============
function renderSite(c){
  const s = DATA.site;
  c.innerHTML = `

// ============== GENERIC LIST RENDERER ==============
function renderList(arrKey, fields, options={}){
  const arr = DATA[arrKey]||[];
  const c = document.getElementById('content');
  const title = options.title||arrKey;
  const icon = options.icon||'list';
  const itemLabel = options.itemLabel||'Item';
  const defaults = options.defaults||{};
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-info-circle"></i><div>${options.help||'Administra los elementos de esta sección.'}</div></div>
    <div class="card"><div class="card-title"><i class="fas fa-${icon}"></i>${title}</div>
    <div class="items-list" id="genList"></div>
    <button class="add-btn" id="addBtn" style="margin-top:14px"><i class="fas fa-plus"></i> Agregar ${itemLabel.toLowerCase()}</button></div>`;
  const list = document.getElementById('genList');
  function refresh(){
    list.innerHTML = arr.map((item,i)=>`
      <div class="item-card">
        <div class="item-header">
          <div class="item-title"><span class="item-num">${i+1}</span> ${itemLabel}${item[fields[0].key]?': '+escapeHtml(String(item[fields[0].key]).slice(0,40)):''}</div>
          <div class="item-actions">
            ${i>0?`<button class="icon-btn" data-mv="${i}" data-d="-1"><i class="fas fa-arrow-up"></i></button>`:''}
            ${i<arr.length-1?`<button class="icon-btn" data-mv="${i}" data-d="1"><i class="fas fa-arrow-down"></i></button>`:''}
            <button class="icon-btn delete" data-del="${i}"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="form-grid">
          ${fields.map(f=>{
            const v = item[f.key]||'';
            const cls = f.full?'form-group full':'form-group';
            if(f.type==='textarea') return `<div class="${cls}"><label class="form-label">${f.label}</label><textarea class="form-textarea" data-i="${i}" data-k="${f.key}">${escapeHtml(v)}</textarea></div>`;
            return `<div class="${cls}"><label class="form-label">${f.label}</label><input type="${f.type||'text'}" class="form-input" value="${escapeHtml(String(v))}" data-i="${i}" data-k="${f.key}" /></div>`;
          }).join('')}
        </div>
        ${item.image?`<div class="preview-row" style="margin-top:10px"><img class="img-preview" src="${item.image}" onerror="this.style.opacity=.3" /></div>`:''}
      </div>`).join('');
    list.querySelectorAll('input,textarea').forEach(el=>{
      el.addEventListener('input',()=>{
        const i = +el.dataset.i, k = el.dataset.k;
        let val = el.value;
        if(el.type==='number') val = +val||0;
        arr[i][k] = val;
      });
    });
    list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      if(confirm('¿Eliminar este elemento?')){arr.splice(+b.dataset.del,1);refresh();}
    }));
    list.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',()=>{
      const i=+b.dataset.mv,d=+b.dataset.d;[arr[i],arr[i+d]]=[arr[i+d],arr[i]];refresh();
    }));
  }
  document.getElementById('addBtn').onclick = ()=>{arr.push({...defaults});refresh();};
  refresh();
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderSchedule(c){

    <div class="card">

      <div class="day-tabs" id="dayTabsAdmin">
        ${DAY_KEYS.map(d=>`<button class="day-tab-admin ${d===currentDay?'active':''}" data-d="${d}">${DAY_LABELS[d]}</button>`).join('')}
      </div>
      <div class="items-list" id="schedList"></div>
      <button class="add-btn" id="addSched" style="margin-top:14px"><i class="fas fa-plus"></i> Agregar programa</button>
    </div>`;
  document.querySelectorAll('.day-tab-admin').forEach(b=>b.addEventListener('click',()=>{
    currentDay = b.dataset.d;
    document.querySelectorAll('.day-tab-admin').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    refreshSched();
  }));
  document.getElementById('addSched').onclick = ()=>{
    if(!DATA.schedule[currentDay]) DATA.schedule[currentDay]=[];
    DATA.schedule[currentDay].push({name:'',time:'',image:''});
    refreshSched();
  };
  refreshSched();
}
function refreshSched(){
  if(!DATA.schedule) DATA.schedule={};
  if(!DATA.schedule[currentDay]) DATA.schedule[currentDay]=[];
  const arr = DATA.schedule[currentDay];
  const list = document.getElementById('schedList');
  if(!arr.length){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-muted)">No hay programas para este día. Agrega uno.</div>';return;}
  list.innerHTML = arr.map((p,i)=>`
    <div class="item-card">
      <div class="item-header">
        <div class="item-title"><span class="item-num">${i+1}</span> ${p.name||'Programa'}</div>
        <div class="item-actions">
          ${i>0?`<button class="icon-btn" data-mv="${i}" data-d="-1"><i class="fas fa-arrow-up"></i></button>`:''}
          ${i<arr.length-1?`<button class="icon-btn" data-mv="${i}" data-d="1"><i class="fas fa-arrow-down"></i></button>`:''}
          <button class="icon-btn delete" data-del="${i}"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Nombre</label><input class="form-input" value="${escapeHtml(p.name||'')}" data-i="${i}" data-k="name" /></div>
        <div class="form-group"><label class="form-label">Horario (ej: 09:00 - 12:00)</label><input class="form-input" value="${escapeHtml(p.time||'')}" data-i="${i}" data-k="time" /></div>
        <div class="form-group"><label class="form-label">URL imagen</label><input class="form-input" value="${escapeHtml(p.image||'')}" data-i="${i}" data-k="image" /></div>
      </div>
    </div>`).join('');
  list.querySelectorAll('input').forEach(el=>el.addEventListener('input',()=>{
    arr[+el.dataset.i][el.dataset.k]=el.value;
  }));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('¿Eliminar?')){arr.splice(+b.dataset.del,1);refreshSched();}
  }));
  list.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',()=>{
    const i=+b.dataset.mv,d=+b.dataset.d;[arr[i],arr[i+d]]=[arr[i+d],arr[i]];refreshSched();
  }));
}
